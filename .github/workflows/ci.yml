name: SyncStream CI/CD

on: 
    push:
      branches: [main]
    pull_request: 
      branches: [main]

jobs: 
  backend: 
        name: Backend (FastAPI)
        runs-on: ubuntu-latest
        defaults: 
          run:
            working-directory: ./backend
        steps: 
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: Lint with ruff
          run: pip install ruff && ruff check app/
        - name: Type check with mypy
          run: pip install mypy && mypy app/ --ignore-missing-imports
          continue-on-error: true #Don't block on type errors early on  
    
  frontend:
        name: Frontend (React)
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: ./frontend
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-node@v4
            with: 
              node-version: '20'
              cache: 'npm'
              cache-dependency-path: frontend/package-lock.json
          - name: Install dependencies
            run: npm ci
          - name: Lint
            run: npm run Lint
            continue-on-error: true #Don't block on lint errors early on
          - name: Build
            run: npm run build
            env:
                VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }} 
                VITE_SUPABASE_ANNON_KEY: ${{ secrets.VITE_SUPABASE_ANNON_KEY }}
                VITE_API_URL: ${{ secrets.VITE_API_URL }}
                VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
                VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}